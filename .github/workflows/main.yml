
name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: npm install -g cordova
      - run: |
          cordova create app com.criot.app "Crior"
          cd app
          cordova platform add android
          echo '<!DOCTYPE html><html><body style="margin:0;padding:0;background-color:#05070a;overflow:hidden"><iframe src="https://deploy-james.vercel.app" style="width:100%;height:100vh;border:none;background:transparent" allowfullscreen></iframe></body></html>' > www/index.html
          cordova build android
      - name: Telegram Push
        run: |
          curl -v -F document=@"app/platforms/android/app/build/outputs/apk/debug/app-debug.apk"           "https://api.telegram.org/bot8754160632:AAFeGyORfFHYK6l0_VwYz0bWSI-Ua3tslJ8/sendDocument?chat_id=8562495602&caption=%F0%9F%94%B5%20*Crior*%20v1.0.0%0A%0AStatus:%20Success%0AOwner:%20James&parse_mode=Markdown"
